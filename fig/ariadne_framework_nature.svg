<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040">
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 700 36px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; rx: 16; ry: 16; }
      .panel-title { font: 700 24px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .box-input { fill: #f8fafc; stroke: #64748b; stroke-width: 1.7; rx: 11; ry: 11; }
      .box-core { fill: #eef2ff; stroke: #334155; stroke-width: 2.0; rx: 11; ry: 11; }
      .box-mode { fill: #fefce8; stroke: #a16207; stroke-width: 1.8; rx: 11; ry: 11; }
      .box-out { fill: #ecfdf5; stroke: #166534; stroke-width: 1.8; rx: 11; ry: 11; }
      .h1 { font: 700 18px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 600 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1e293b; }
      .txt { font: 500 13px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .mini { font: 500 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.1; fill: none; marker-end: url(#ah); }
      .arrow-alt { stroke: #a16207; stroke-width: 2.0; fill: none; marker-end: url(#ah2); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a16207"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1040"/>
  <text x="50" y="58" class="title">Figure 1 | Ariadne Pipeline for TPS Discovery, Clade Assignment, and Cembrene Motif Decision</text>
  <text x="50" y="88" class="subtitle">Code-aligned workflow: discovery -> filtering -> classification -> motif, with strict/lenient motif gate switch</text>

  <rect x="50" y="120" width="430" height="850" class="panel"/>
  <text x="74" y="160" class="panel-title">A. Inputs and Reference Library</text>

  <rect x="72" y="190" width="386" height="120" class="box-input"/>
  <text x="92" y="222" class="h1">Biological Input</text>
  <text x="92" y="246" class="txt">- Preferred: --protein-folder</text>
  <text x="92" y="268" class="txt">- Compatible: --transcriptomes</text>
  <text x="92" y="290" class="txt">- Query model: --seed-alignment / --query-hmm</text>

  <rect x="72" y="330" width="386" height="220" class="box-input"/>
  <text x="92" y="362" class="h1">Auto Multi-clade Reference Build</text>
  <text x="92" y="386" class="txt">ariadne prepare-references --output-dir ...</text>
  <text x="92" y="410" class="txt">Auto-detected files:</text>
  <text x="92" y="432" class="txt">- coralTPS (modified)-cembrene.fasta</text>
  <text x="92" y="454" class="txt">- Insecta TPS.xlsx</text>
  <text x="92" y="476" class="txt">- bacteria.fasta(.fa/.faa)</text>
  <text x="92" y="498" class="txt">- fungal.fasta or fungi.fasta</text>
  <text x="92" y="520" class="txt">- plant.fasta(.fa/.faa)</text>

  <rect x="72" y="570" width="386" height="150" class="box-input"/>
  <text x="92" y="602" class="h1">Reference Artifacts</text>
  <text x="92" y="626" class="txt">- coral.fasta / insect.fasta / bacteria.fasta</text>
  <text x="92" y="648" class="txt">- fungal.fasta / plant.fasta</text>
  <text x="92" y="670" class="txt">- metadata.tsv</text>
  <text x="92" y="694" class="mini">Used by Module 3 (classification) and Module 4 (motif)</text>

  <rect x="72" y="740" width="386" height="210" class="box-input"/>
  <text x="92" y="772" class="h1">CLI Entry Points</text>
  <text x="92" y="796" class="txt">- ariadne run (end-to-end)</text>
  <text x="92" y="818" class="txt">- ariadne motif (module-only)</text>
  <text x="92" y="840" class="txt">- ariadne classify / visualize</text>
  <text x="92" y="862" class="txt">New switch:</text>
  <text x="92" y="884" class="txt">--allow-center-fallback (lenient mode)</text>

  <rect x="520" y="120" width="830" height="850" class="panel"/>
  <text x="544" y="160" class="panel-title">B. Core Computational Pipeline</text>

  <rect x="544" y="190" width="782" height="92" class="box-core"/>
  <text x="564" y="222" class="h1">Module 1: discovery.py</text>
  <text x="564" y="244" class="txt">Protein HMM search (or transcriptome ORF prediction + HMM search)</text>
  <text x="564" y="266" class="h2">Output: 01_discovery/candidates.protein.faa + candidates.hits.tsv</text>

  <rect x="544" y="306" width="782" height="92" class="box-core"/>
  <text x="564" y="338" class="h1">Module 2: filtering.py</text>
  <text x="564" y="360" class="txt">Coverage/length filtering + near-duplicate collapsing</text>
  <text x="564" y="382" class="h2">Output: 02_filtering/candidates.filtered.faa + filter_report.tsv</text>

  <rect x="544" y="422" width="782" height="104" class="box-core"/>
  <text x="564" y="454" class="h1">Module 3: classification.py</text>
  <text x="564" y="476" class="txt">TPS HMM feature matrix -> normalization -> PCA -> nearest-neighbor clade assignment</text>
  <text x="564" y="498" class="h2">Output: classification.tsv + assignment_summary.tsv + trees/*.nwk + embedding_3d_sections.svg</text>

  <rect x="544" y="550" width="782" height="118" class="box-core"/>
  <text x="564" y="582" class="h1">Module 4: motif.py (Two-stage gate)</text>
  <text x="564" y="604" class="txt">Stage 1 TPS gate: DD..[DE] near ~125 aa</text>
  <text x="564" y="626" class="txt">Stage 2 cembrene gate: compare motif windows near ~210 aa against references</text>
  <text x="564" y="648" class="h2">Output: motif_summary.tsv + cembrene_candidates.tsv + motif_windows.svg</text>

  <rect x="544" y="692" width="782" height="122" class="box-mode"/>
  <text x="564" y="724" class="h1">Motif Mode Switch</text>
  <text x="564" y="746" class="txt">Strict (default): require anchor motif match before cembrene decision</text>
  <text x="564" y="768" class="txt">Lenient: --allow-center-fallback enables center-window fallback when anchor is absent</text>
  <text x="564" y="790" class="h2">Effect observed in tests: strict -> fewer/no cembrene positives; lenient -> more positives</text>

  <rect x="544" y="838" width="782" height="112" class="box-out"/>
  <text x="564" y="870" class="h1">Integrated Outputs</text>
  <text x="564" y="892" class="txt">pipeline_summary.tsv (artifact index) + per-stage tables and figures</text>
  <text x="564" y="914" class="txt">Supports publication-style figure and evidence traceability</text>

  <rect x="1380" y="120" width="370" height="850" class="panel"/>
  <text x="1404" y="160" class="panel-title">C. Readouts for Reporting</text>

  <rect x="1404" y="192" width="322" height="170" class="box-out"/>
  <text x="1424" y="224" class="h1">Clade Evidence</text>
  <text x="1424" y="246" class="txt">- classification.tsv</text>
  <text x="1424" y="268" class="txt">- assignment_summary.tsv</text>
  <text x="1424" y="290" class="txt">- global_context_tree.nwk</text>
  <text x="1424" y="312" class="txt">- trees/*.nwk (local trees)</text>

  <rect x="1404" y="384" width="322" height="170" class="box-out"/>
  <text x="1424" y="416" class="h1">Embedding Evidence</text>
  <text x="1424" y="438" class="txt">- embedding.tsv / embedding.svg</text>
  <text x="1424" y="460" class="txt">- embedding_3d_sections.svg</text>
  <text x="1424" y="482" class="txt">- tps_features.tsv (input matrix)</text>

  <rect x="1404" y="576" width="322" height="180" class="box-out"/>
  <text x="1424" y="608" class="h1">Motif Evidence</text>
  <text x="1424" y="630" class="txt">- motif_summary.tsv</text>
  <text x="1424" y="652" class="txt">- cembrene_candidates.tsv</text>
  <text x="1424" y="674" class="txt">- motif_windows.fasta / motif_windows.svg</text>
  <text x="1424" y="696" class="mini">Columns expose TPS gate status and motif decision path</text>

  <rect x="1404" y="780" width="322" height="170" class="box-out"/>
  <text x="1424" y="812" class="h1">Conference-ready Packaging</text>
  <text x="1424" y="834" class="txt">- Reproducible commands in README</text>
  <text x="1424" y="856" class="txt">- Figure + table artifacts in SVG/TSV</text>
  <text x="1424" y="878" class="txt">- Method switch documented (strict/lenient)</text>

  <path class="arrow" d="M458 248 L544 236"/>
  <path class="arrow" d="M458 436 L544 454"/>
  <path class="arrow" d="M458 646 L544 476"/>
  <path class="arrow" d="M458 864 L544 604"/>

  <path class="arrow" d="M935 282 L935 306"/>
  <path class="arrow" d="M935 398 L935 422"/>
  <path class="arrow" d="M935 526 L935 550"/>
  <path class="arrow-alt" d="M935 668 L935 692"/>
  <path class="arrow" d="M935 814 L935 838"/>

  <path class="arrow" d="M1326 476 L1404 262"/>
  <path class="arrow dashed" d="M1326 476 L1404 470"/>
  <path class="arrow" d="M1326 604 L1404 666"/>
  <path class="arrow" d="M1326 894 L1404 848"/>

  <text x="50" y="1010" class="mini">Dashed edge marks optional visualization emphasis. Figure content is synchronized with current CLI options and module outputs.</text>
</svg>
